services:
  - type: web
    name: sunrise-connect-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false # Set this to your MongoDB Atlas connection string in the Render Dashboard
      - key: JWT_SECRET
        generateValue: true # Generates a secure random JWT secret automatically
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: REFRESH_TOKEN_EXPIRES_IN
        value: 7d
      - key: LOG_LEVEL
        value: info
      - key: RATE_LIMIT_WINDOW_MS
        value: "900000"
      - key: RATE_LIMIT_MAX
        value: "100"

  - type: static
    name: sunrise-connect-admin
    plan: free
    rootDir: admin-frontend
    buildCommand: npm install && npm run build
    publishDir: dist
    routes:
      # Rewrite frontend /api requests to the Render backend service
      - type: rewrite
        source: /api/*
        destination: https://sunrise-connect-backend.onrender.com/api/*
      # Support client-side routing fallback for React SPA
      - type: rewrite
        source: /*
        destination: /index.html

  - type: static
    name: sunrise-connect-parent
    plan: free
    rootDir: FlutterProject
    buildCommand: bash build_web.sh
    publishDir: build/web
    routes:
      # Support client-side routing fallback for Flutter Web
      - type: rewrite
        source: /*
        destination: /index.html
