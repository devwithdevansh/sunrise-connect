name: sunrise_connect
description: "Sunrise Connect — parent-facing school fee management app."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management, routing, dependency injection
  get: ^4.6.6

  # Networking
  http: ^1.2.2

  # Local persistence (auth tokens)
  shared_preferences: ^2.5.5

  # Date/number formatting
  intl: ^0.19.0

  # Typography
  google_fonts: ^6.2.1

  # Micro-animations used across views
  flutter_animate: ^4.5.2

  cupertino_icons: ^1.0.8
  pdf: ^3.13.0
  path_provider: ^2.1.6
  open_filex: ^4.7.0
  printing: ^5.15.0
  flutter_secure_storage: ^9.2.2

  # Push Notifications (Firebase)
  firebase_core: ^3.13.1
  firebase_messaging: ^15.2.5
  flutter_local_notifications: ^18.0.1
  lottie: ^3.5.0
  shimmer: ^3.0.0
  audioplayers: ^6.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.jpg"

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/
    - assets/sounds/
