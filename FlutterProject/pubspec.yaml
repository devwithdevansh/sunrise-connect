name: sunrise_connect
description: "Sunrise Connect — parent-facing school fee management app."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management, routing, dependency injection
  get: ^4.6.6

  # Networking
  http: ^1.2.2

  # Local persistence (auth tokens)
  shared_preferences: ^2.3.2

  # Date/number formatting
  intl: ^0.19.0

  # Typography
  google_fonts: ^6.2.1

  # Micro-animations used across views
  flutter_animate: ^4.5.2

  cupertino_icons: ^1.0.8
  pdf: ^3.13.0
  path_provider: ^2.1.6
  open_filex: ^4.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - .env
    # staff_config.json is intentionally NOT committed to git (see .gitignore).
    # Run `cp assets/config/staff_config.example.json assets/config/staff_config.json`
    # and fill in real values before building, or StaffConfig will fail soft
    # and the staff-bypass calls will simply return no token.
    - assets/config/staff_config.json
    - assets/config/staff_config.example.json
